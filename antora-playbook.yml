site:
  title: ThoughtSpot Documentation
  url: https://g-docs-staging.vercel.app
  start_page: home::index.adoc
  keys:
    google_analytics: UA-44946579-2
# urls:
#  html_extension_style: indexify
content:
  sources:
  - url: .
    branches: HEAD
    start_path: home
  - url: git@github.com:thoughtspot/thoughtspot-docs.git
  # Cloud docs branches
    branches: ['26.5.0.cl', '26.6.0.cl']
    start_path: cloud/
  - url: git@github.com:thoughtspot/thoughtspot-docs.git
    # Software docs branches
    branches: [ '10.10.0.sw', '26.3.0.sw' ]
    start_path: software/
  - url: git@github.com:thoughtspot/thoughtspot-docs.git
    # Mobile docs branches
    branches: [ '4.1.0.mb', '4.2.0.mb','4.6.0.mb' ]
    start_path: mobile/
  - url: git@github.com:thoughtspot/thoughtspot-docs.git
    # Seekwell docs branches
    branches: [ 'seekwell' ]
    start_path: seekwell/
ui:
  bundle:
    # url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/master/raw/build/ui-bundle.zip?job=bundle-stable
    url: ui-bundle/ui2-bundle.zip
  supplemental_files:
  - path: .nojekyll
  - path: ui.yml
    contents: "static_files: [ .nojekyll ]"
    snapshot: true
asciidoc:
  attributes:
    #software: true
    #cloud: false
    page-company: ThoughtSpot
    tabs: tabs
    support-url: https://community.thoughtspot.com/customers/s/contactsupport[ThoughtSpot Support^]
    seekwell: SeekWell
    A: ''
    cl-subscription-agreement: https://www.thoughtspot.com/legal/thoughtspot-cloud-subscription-agreement[subscription agreement^]
  extensions:
  - '@asciidoctor/tabs'
  - './lib/accordion-block.js'
output:
  clean: true
  dir: build/
runtime:
  fetch: true
  log:
    level: error
